services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      FINANCEPULSE_SYMBOLS: btcusdt,ethusdt,solusdt,bnbusdt,xrpusdt,dogeusdt,adausdt,avaxusdt,linkusdt
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
